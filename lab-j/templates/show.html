{% extends 'layout.html' %}
{% block body_class %}show{% endblock %}

{% block content %}
<h1>Specyfikacja: {{ tank.name }}</h1>
<article>
    <p><strong>ID w bazie:</strong> {{ tank.id }}</p>
    <p><strong>Typ pojazdu:</strong> {{ tank.type }}</p>
    <p><strong>Nacja:</strong> {{ tank.nation }}</p>
    <p><strong>Kaliber:</strong> {{ tank.caliber }}</p>
</article>
<ul class="action-list">
    <li><a href="{{ url_for('index') }}">Powrót do listy</a></li>
</ul>
{% endblock %}
