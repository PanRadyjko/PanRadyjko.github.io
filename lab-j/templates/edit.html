{% extends 'layout.html' %}
{% block body_class %}edit{% endblock %}

{% block content %}
<h1>Edycja: {{ tank.name }}</h1>
<form method="POST" class="edit-form">
    <div class="form-group"><label>Nazwa:</label><input type="text" name="name" value="{{ tank.name }}" required></div>
    <div class="form-group"><label>Typ:</label><input type="text" name="type" value="{{ tank.type }}" required></div>
    <div class="form-group"><label>Nacja:</label><input type="text" name="nation" value="{{ tank.nation }}" required></div>
    <div class="form-group"><label>Kaliber:</label><input type="text" name="caliber" value="{{ tank.caliber }}" required></div>
    <div class="form-group"><button type="submit">Zapisz zmiany</button></div>
</form>
<ul class="action-list">
    <li><a href="{{ url_for('index') }}">Anuluj</a></li>
</ul>
{% endblock %}
