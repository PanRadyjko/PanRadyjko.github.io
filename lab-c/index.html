<!doctype html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Piotr Mikulski (57756) - PTW LAB C</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-image@0.4.0/leaflet-image.js"></script>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <script src="scripts.js" defer></script>
</head>
<body>
<header>
    <h1>CENTRUM OPERACYJNE: REKONESANS</h1>
</header>
<div class="grid-container">
    <section class="map-sector">
        <div id="map"></div>
        <div class="command-panel">
            <button id="get-location">MOJA LOKALIZACJA (GPS)</button>
            <button id="download-map">POBIERZ MAPĘ TAKTYCZNĄ</button>
        </div>
    </section>
    <section class="puzzle-sector">
        <div id="puzzle-board"></div>
        <div id="puzzle-pieces"></div>
    </section>
</div>
<canvas id="offscreen-canvas" width="600" height="600" style="display:none;"></canvas>
<footer>
    <p>2026 Piotr Mikulski</p>
</footer>
</body>
</html>
